# ==========================================
# RBP Test Configuration (PABPC1)
# Pipeline: Attributions -> Modisco -> Enrichment -> Mapping
# ==========================================

# --- Global Paths & Settings ---
experiment_dir: "/mnt/data_sda/jdearborn/scratch/JD_build/testing/20260110/test_refactor/rbp_run"
output_dir: "/mnt/data_sda/jdearborn/scratch/JD_build/testing/20260110/test_refactor/rbp_run"

# Input Data
coord_file_path: "/mnt/data_sda/jdearborn/scratch/JD_build/interpretation/motif_discovery/pabpc1/ramos_data/subset_peaks_data.csv"
gtf_file: "/mnt/data_sda/jdearborn/genomes/human/GRCh38/gtf/Homo_sapiens.GRCh38.110.gtf"
attribution_mapping_file: "/mnt/data_sda/jdearborn/scratch/JD_build/testing/20260110/test_refactor/rbp_run/attribution_mapping.csv"

# Model Settings
species: "human"
model_selection: "pretrained"
task_id: "ENCFF560YUT"

# ==========================================
# Step 1: Get Attributions
# ==========================================
# For RBP peaks, we want the input window centered exactly on the peak/element.
centering_mode: "element_only"
attr_respect_to: "whole_transcript" 
attribution_method: "saliency" 
attribution_batch_size: 1
name_col: "unique_ID" # Ensures we track the ID correctly

# ==========================================
# Step 2: Run Modisco
# ==========================================
mask_mode: "element_only"       # Generic masking (keep peak + flank)
measurement: "whole_transcript" # Label used for file naming
modisco_len: 1000

# Subsetting: Run separately for Up-regulated, Down-regulated, and All
groupby_column: "expression"    
flank: [500, 50]                # Run Modisco twice: wide flank (500) and narrow flank (50)

# Flags
save_native_attributions: false
save_masked_attributions: false
generate_fastas: false          # RBP pipeline creates FASTAs in the Enrichment step dynamically

# ==========================================
# Step 3: Enrichment Analysis
# ==========================================
enrichment:
  run_sea: true
  run_fimo: true
  
  # Where to find the motifs for enrichment?
  # source_subset: "all_peaks_modisco"
  # source_flank: "masked_50bp_flank"
  
  # Comparisons (Primary vs Control)
  comparisons:
    # - primary: "up"
    #   control: "down"
    - primary: "up"
      control: "all"
    - primary: "down"
      control: "all"

# ==========================================
# Step 4: Motif Mapping
# ==========================================
motif_mapping:
  modisco_window: 1000
  selection_method: "modiscolite"
  
  # For mapping plots, we usually want to see where the peak is relative to the Whole Transcript
  attr_respect_to: "whole_transcript" 
  
  # Explicitly tell mapping where to find results (since RBP has nested structure)
  # source_subset: "all_peaks_modisco" 
  # source_flank: "masked_50bp_flank"
  
  plot:
    modes: ["combined"]
    topN: 5
    colors:
      pos: "royalblue"
      neg: "crimson"