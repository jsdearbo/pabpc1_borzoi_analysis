# ==========================================
# Fig. 3 Configuration — PABPC1 eCLIP peaks
# Pipeline: Attributions -> Modisco -> Enrichment -> Mapping
# ==========================================

# --- Global Paths & Settings ---
experiment_dir: "outputs/fig3"

# Input Data
# Download the GTF before running — see README for instructions.
coord_file_path: "manuscript_runs/subset_peaks_data.csv"
gtf_file: "/path/to/Homo_sapiens.GRCh38.110.gtf"

# Model Settings
species: "human"
model_selection: "pretrained"
task_id: "ENCFF560YUT"

# ==========================================
# Step 1: Get Attributions
# ==========================================
# Center the input window on each eCLIP peak, but compute gradients
# with respect to the whole transcript signal.
centering_mode: "element_only"
attr_respect_to: "whole_transcript"
attribution_method: "saliency"
attribution_batch_size: 1
name_col: "unique_ID"

# ==========================================
# Step 2: Run Modisco
# ==========================================
mask_mode: "element_only"       # Keep attribution signal within peak ± flank only
modisco_len: 1000

# Run separately for up-regulated, down-regulated, and all peaks
groupby_column: "expression"
flank: [50]                # Two MoDISco runs: wide (500 bp) and narrow (50 bp) flank

# Flags
save_native_attributions: false
save_masked_attributions: false
generate_fastas: false          # FASTAs are generated dynamically in the enrichment step

# ==========================================
# Step 3: Enrichment Analysis
# ==========================================
enrichment:
  run_sea: false
  run_fimo: true

  source_subset: "all_peaks_modisco"

  comparisons:
    - primary: "up"
      control: "down"

# ==========================================
# Step 4: Motif Mapping
# ==========================================
motif_mapping:
  modisco_window: 1000
  selection_method: "modiscolite"
  attr_respect_to: "whole_transcript"
