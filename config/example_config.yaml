# =============================================================================
# PABPC1 Borzoi Attribution Pipeline — Example Configuration
# =============================================================================
# All four steps read from this single file.
# Copy and edit this file for each analysis run; do NOT commit paths that are
# specific to your local system.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared settings (used by multiple steps)
# ---------------------------------------------------------------------------

# Root directory for all outputs from this analysis run
experiment_dir: "/path/to/outputs/my_run/saliency"

# Coordinate file: one row per genomic element (peak / RBP site / intron)
# Required columns: chrom, start, end, strand, intron_name (or name)
# Optional columns: expression (up/down), tscript_start, tscript_end
coord_file_path: "/path/to/data/coordinates.csv"

# Reference genome GTF (used for gene-map visualisation in step 4)
gtf_file: "/path/to/genome/Homo_sapiens.GRCh38.110.gtf"

# Species: 'human' or 'mouse'
species: "human"

# Borzoi model: 'pretrained' loads the public Borzoi weights via gReLU.
# Use 'fine_tuned' and supply checkpoint_path to use a custom checkpoint.
model_selection: "pretrained"
# checkpoint_path: "/path/to/epoch=19-step=11460.ckpt"

# ENCODE task ID for the RNA-seq track to use as the prediction target
task_id: "ENCFF560YUT"


# ---------------------------------------------------------------------------
# Step 1: Get Attributions  (01_get_attributions.py)
# ---------------------------------------------------------------------------

# How to centre the input window on each element:
#   'element_only'     — centre on the element itself (peak / intron)
#   'whole_transcript' — centre on the full transcript (requires tscript_start/end)
centering_mode: "element_only"

# Genomic region over which Borzoi predictions are aggregated before computing
# gradients (can differ from centering_mode):
#   'element_only'     — aggregate over the element only
#   'whole_transcript' — aggregate over the whole transcript
attr_respect_to: "element_only"

# Attribution method: 'inputxgradient' (fast, recommended) or 'saliency'
attribution_method: "inputxgradient"

# Column in coord_file used as the element identifier
name_col: "intron_name"


# ---------------------------------------------------------------------------
# Step 2: Run MoDISco  (02_run_modisco.py)
# ---------------------------------------------------------------------------

# Masking strategy applied before MoDISco:
#   'element_only' — mask everything outside element ± flank
mask_mode: "element_only"

# One or more flank sizes (bp). A separate MoDISco run is performed for each.
flank: [500, 50]

# MoDISco seqlet search window (bp)
modisco_len: 100

# Column in coord_file_path to split data into subsets (optional).
# e.g. 'expression' → creates 'up_peaks_modisco', 'down_peaks_modisco', 'all_peaks_modisco'
# Set to null to skip subsetting (only 'all_peaks_modisco' is produced).
groupby_column: "expression"


# ---------------------------------------------------------------------------
# Step 3: Enrichment Analysis  (03_run_enrichment.py)
# ---------------------------------------------------------------------------

enrichment:
  run_sea:  true   # Run SEA (MEME Suite Simple Enrichment Analysis)
  run_fimo: true   # Run FIMO (tangermeme)

  # Which MoDISco run to use as the source of motifs
  source_subset: "all_peaks_modisco"
  source_flank:  "masked_50bp_flank"

  # Pairwise comparisons. 'primary' and 'control' must match groupby_column
  # values (or 'all' for the full dataset).
  comparisons:
    - primary: "up"
      control: "down"
    - primary: "up"
      control: "all"
    - primary: "down"
      control: "all"


# ---------------------------------------------------------------------------
# Step 4: Map Motifs  (04_map_motifs.py)
# ---------------------------------------------------------------------------

motif_mapping:
  # modisco_window must match the value used in step 2 for the run being mapped
  modisco_window:   100
  model_seq_len:    524288   # Borzoi full input length (do not change)
  selection_method: "modiscolite"

  # Must match attr_respect_to from step 1
  attr_respect_to: "element_only"

  plot:
    modes: ["combined", "separate"]
    figsize: [20, 1.5]   # (width, height) per gene-map row

  # Optional: restrict which patterns are plotted
  # motifs_of_interest: ["pos_pattern_0", "pos_pattern_1"]
  # motif_regex: "pos_"
  # motif_limit: 10

  # Optional: directory containing BigWig files for read-density tracks
  # bigwig_dir: "/path/to/bigwigs"
